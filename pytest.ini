[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests that run quickly without external dependencies
    integration: Integration tests that require Databricks Connect
    slow: Tests that take significant time to run
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
