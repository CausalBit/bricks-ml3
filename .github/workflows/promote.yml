name: Promote dev to main

on:
  workflow_run:
    workflows: ["Deploy to Dev"]
    types: [completed]
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    name: Create or update promotion PR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR from dev to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main dev

          COMMIT_COUNT=$(git rev-list --count origin/main..origin/dev 2>/dev/null || echo "0")

          if [ "$COMMIT_COUNT" = "0" ]; then
            echo "dev and main are identical — nothing to promote."
            exit 0
          fi

          COMMIT_LIST=$(git log origin/main..origin/dev --oneline --no-merges 2>/dev/null || echo "No new commits")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

          cat > "$RUNNER_TEMP/pr_body.md" <<EOF
          ## Promote dev to main

          **$COMMIT_COUNT commit(s)** ready for production.

          ### Commits
          \`\`\`
          $COMMIT_LIST
          \`\`\`

          ### Dev deploy
          Deployed and tested in \`dsml_dev\`: [workflow run]($RUN_URL)

          ---
          *Auto-generated by promote.yml. Merging this PR deploys to staging. Promote to prod via the Deploy to Prod workflow.*
          EOF

          EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body-file "$RUNNER_TEMP/pr_body.md"
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Promote dev → main" \
              --body-file "$RUNNER_TEMP/pr_body.md"
            echo "Created new promotion PR"
          fi
